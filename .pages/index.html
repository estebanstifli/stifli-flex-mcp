<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WP Abilities Directory</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f172a;
  color: #cbd5e1;
  padding: 30px 40px;
  line-height: 1.6;
}

h1 { color: #38bdf8; margin-bottom: 4px; }

p { color: #64748b; margin-top: 0; }

input {
  padding: 10px 14px;
  width: 340px;
  margin-bottom: 20px;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 8px;
  color: #e2e8f0;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

input:focus {
  border-color: #38bdf8;
}

input::placeholder {
  color: #475569;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 12px 14px;
  border-bottom: 1px solid #1e293b;
  text-align: left;
  font-size: 14px;
}

th {
  cursor: pointer;
  background: #1e293b;
  color: #94a3b8;
  font-weight: 600;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.05em;
  user-select: none;
}

th:hover {
  color: #38bdf8;
}

tr:hover {
  background: #1e293b88;
}

/* Plugin slug link */
td a {
  color: #7dd3fc;
  text-decoration: none;
  font-weight: 500;
  font-family: 'Cascadia Code', 'Fira Code', 'SF Mono', monospace;
  font-size: 13px;
  padding: 3px 7px;
  border-radius: 4px;
  background: #1e293b;
  border: 1px solid #334155;
  transition: all 0.15s;
}

td a:hover {
  color: #fff;
  background: #0ea5e9;
  border-color: #0ea5e9;
}

/* Score column */
td:nth-child(2) {
  font-weight: 700;
  color: #e2e8f0;
  font-variant-numeric: tabular-nums;
}

/* Patterns column */
td:nth-child(4) {
  color: #94a3b8;
  font-size: 13px;
}

.badge {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.high { background: #166534; color: #4ade80; }
.medium { background: #713f12; color: #fbbf24; }
.noise { background: #7f1d1d; color: #fca5a5; }

</style>
</head>

<body>

<h1>🚀 WordPress Abilities Plugins Directory</h1>

<p>Auto-generated from 58,000+ plugins</p>

<input type="text" id="search" placeholder="Search plugin...">

<table id="table">
<thead>
<tr>
  <th onclick="sortTable(0)">Plugin</th>
  <th onclick="sortTable(1)">Score</th>
  <th onclick="sortTable(2)">Confidence</th>
  <th>Patterns</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const CSV_URL = "plugin_ranked_summary.csv";

let tableData = [];

fetch(CSV_URL)
  .then(res => res.text())
  .then(text => {
    const rows = text.split("\n").slice(1);
    rows.forEach(row => {
      const cols = row.split(",");
      if (cols.length < 10) return;

      tableData.push({
        slug: cols[0],
        score: parseInt(cols[10]) || 0,
        confidence: cols[11],
        patterns: cols[12]
      });
    });

    renderTable(tableData);
  });

function renderTable(data) {
  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  data.forEach(p => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>
        <a href="https://wordpress.org/plugins/${p.slug}/" target="_blank">
          ${p.slug}
        </a>
      </td>
      <td>${p.score}</td>
      <td><span class="badge ${p.confidence}">${p.confidence}</span></td>
      <td>${p.patterns}</td>
    `;

    tbody.appendChild(tr);
  });
}

document.getElementById("search").addEventListener("input", e => {
  const value = e.target.value.toLowerCase();
  const filtered = tableData.filter(p =>
    p.slug.toLowerCase().includes(value)
  );
  renderTable(filtered);
});

function sortTable(n) {
  tableData.sort((a, b) => {
    if (n === 1) return b.score - a.score;
    return a.slug.localeCompare(b.slug);
  });
  renderTable(tableData);
}
</script>

</body>
</html>
